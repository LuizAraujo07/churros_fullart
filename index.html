<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Álbum de Cartas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&family=Saira+Condensed:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="stars-container"></div>

<!-- HEADER -->
<header id="header">
  <div>
    <div id="album-title">★ ÁLBUM DE CARTAS DO LUIZ ★</div>
    <div id="user-display">▶ <span id="current-user">LUIZ</span></div>
  </div>
  <div id="header-right">
    <button class="retro-btn" id="btn-prev">◀ PREV</button>
    <button class="retro-btn" id="btn-change-user">TROCAR USER ▼</button>
    <button class="retro-btn" id="btn-next">NEXT ▶</button>
  </div>
</header>

<!-- NAV BAR -->
<div id="nav-bar">
  <div id="page-indicator">
    PÁG <span id="cur-page">1</span> / <span id="total-pages">100</span>
    &nbsp;·&nbsp; CARTAS <span id="range-start">1</span>–<span id="range-end">18</span>
  </div>
  <div id="page-jump-wrap">
    <label for="page-jump">IR P/ PÁG</label>
    <input type="number" id="page-jump" min="1" max="100" value="1">
    <button class="retro-btn" id="btn-go" style="font-size:7px;padding:7px 10px">GO!</button>
  </div>
</div>

<!-- ALBUM BOOK -->
<div id="album-outer">
  <div id="album-book">
    <div class="album-page album-page-left">
      <div class="page-label" id="label-left">LADO A</div>
      <div class="card-grid" id="grid-left"></div>
    </div>
    <div class="album-page album-page-right">
      <div class="page-label" id="label-right">LADO B</div>
      <div class="card-grid" id="grid-right"></div>
    </div>
  </div>
</div>

<!-- PROGRESS -->
<div id="progress-wrap">
  <div id="progress-label">PROGRESSO</div>
  <div id="progress-bar-outer">
    <div id="progress-bar-inner" style="width:1%"></div>
  </div>
  <div id="progress-pct">1%</div>
</div>

<!-- MODAL: CARTA -->
<div class="modal-backdrop" id="card-modal">
  <div class="modal-box">
    <button class="modal-close" id="close-card-modal">✕</button>
    <div class="modal-title" id="card-modal-title">CARTA #0000</div>

    <!-- Arte da carta -->
    <div class="card-modal-art">
      🚧<br>EM OBRAS
    </div>

    <!-- Painel de info do Pokémon (populado via CSV local) -->
    <div id="card-pokemon-info" class="card-pokemon-info"></div>

    <div class="modal-body">
      <p>Em breve as informações desta carta estarão disponíveis aqui.</p>
    </div>
  </div>
</div>

<!-- MODAL: USUÁRIO -->
<div class="modal-backdrop" id="user-modal">
  <div class="modal-box">
    <button class="modal-close" id="close-user-modal">✕</button>
    <div class="modal-title">SELECIONAR USUÁRIO</div>
    <div class="modal-body">
      <ul class="user-list" id="user-list"></ul>
      <button class="retro-btn" id="btn-confirm-user" style="width:100%;font-size:7px">CONFIRMAR</button>
    </div>
  </div>
</div>

<script src="album.js"></script>
</body>
</html>
